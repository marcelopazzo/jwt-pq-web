      <stop offset="55%" stop-color="#08090b" stop-opacity="0"/>
    </linearGradient>
    <pattern id="lattice" width="48" height="48" patternUnits="userSpaceOnUse">
      <path d="M 48 0 L 0 0 0 48" fill="none" stroke="#1b1e23" stroke-width="1"/>
    </pattern>
  </defs>

  <rect width="1200" height="630" fill="#08090b"/>
