service: jwt-pq-web
image: marcelopazzo/jwt-pq-web

ssh:
  user: jwt-pq-deploy

servers:
  web:
    hosts:
      - 46.225.176.175

proxy:
  ssl: true
  host: jwt-pq.marcelopazzo.com
  app_port: 3000
  healthcheck:
    path: /up
    interval: 10
    timeout: 5

registry:
  server: ghcr.io
  username:
    - KAMAL_REGISTRY_USERNAME
  password:
    - KAMAL_REGISTRY_PASSWORD

builder:
  arch: arm64

env:
  clear:
    RAILS_ENV: production
    RAILS_LOG_TO_STDOUT: "1"
    RAILS_SERVE_STATIC_FILES: "1"
    JWKS_STORAGE_DIR: /rails/storage
    APP_URL: https://jwt-pq.marcelopazzo.com
    WEB_CONCURRENCY: "0"
    RAILS_MAX_THREADS: "3"
  secret:
    - RAILS_MASTER_KEY

volumes:
  - "jwt_pq_web_storage:/rails/storage"

asset_path: /rails/public/assets

aliases:
  console: app exec --interactive --reuse "bin/rails console"
  shell: app exec --interactive --reuse "bash"
  logs: app logs -f
