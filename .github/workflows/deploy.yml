name: Deploy

on:
  workflow_dispatch:
    inputs:
      run_setup:
        description: "Run `kamal setup` instead of `kamal deploy` (first-time bootstrap)"
        type: boolean
        default: false

concurrency:
  group: deploy-production
  cancel-in-progress: false

permissions:
  contents: read
  packages: write

jobs:
  deploy:
    runs-on: ubuntu-24.04-arm

    environment:
      name: production
      url: https://jwt-pq.marcelopazzo.com

    env:
      KAMAL_REGISTRY_USERNAME: ${{ github.actor }}
      KAMAL_REGISTRY_PASSWORD: ${{ secrets.GITHUB_TOKEN }}

    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0

      - name: Set up Ruby
        uses: ruby/setup-ruby@7372622e62b60b3cb750dcd2b9e32c247ffec26a # v1.302.0
        with:
          ruby-version: .ruby-version
          bundler-cache: true

      - name: Set up SSH agent
        uses: webfactory/ssh-agent@e83874834305fe9a4a2997156cb26c5de65a8555 # v0.10.0
        with:
          ssh-private-key: ${{ secrets.SSH_PRIVATE_KEY }}

      - name: Pin server host key
        run: |
          mkdir -p ~/.ssh
          echo "46.225.176.175 ssh-ed25519 AAAAC3NzaC1lZDI1NTE5AAAAICFy0uMMD+IrRxG6GMnCWERWQlMTVPwx0GPBiMYGACcW" >> ~/.ssh/known_hosts

      - name: Write master key
        env:
          RAILS_MASTER_KEY: ${{ secrets.RAILS_MASTER_KEY }}
        run: printenv RAILS_MASTER_KEY > config/master.key

      - name: Release stale deploy lock
        if: inputs.run_setup != true
        run: bundle exec kamal lock release || true

      - name: Kamal setup (first-time bootstrap)
        if: inputs.run_setup == true
        run: bundle exec kamal setup

      - name: Kamal deploy
        if: inputs.run_setup != true
        run: bundle exec kamal deploy

      - name: Clean up local secrets
        if: always()
        run: rm -f config/master.key
